<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Services — CampusConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="browse.css">
</head>
<body>

<button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
<button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-sun"></i></button>

<div class="browse-container">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-graduation-cap"></i>
      <span>CampusConnect</span>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Menu</div>
      <div class="nav-item active" data-page="browse">
        <i class="fas fa-search"></i>
        <span>Browse</span>
      </div>
      <div class="nav-item" data-page="dashboard">
        <i class="fas fa-th-large"></i>
        <span>Dashboard</span>
      </div>
      <div class="nav-item" data-page="inbox">
        <i class="fas fa-envelope"></i>
        <span>Inbox</span>
      </div>
      <div class="nav-item" data-page="leaderboard">
        <i class="fas fa-trophy"></i>
        <span>Leaderboard</span>
      </div>
      <div class="nav-divider"></div>
      <div class="nav-item" data-page="list-service">
        <i class="fas fa-plus-circle"></i>
        <span>List a service</span>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="main-header">
      <div class="header-title">
        <h1>Browse services</h1>
        <p>Find the perfect service from talented students</p>
      </div>
      <button class="list-service-btn" id="listServiceBtn">
        <i class="fas fa-plus"></i> List a service
      </button>
    </div>

    <div class="scroll-area">
      <!-- Filter Section -->
      <div class="filter-card">
        <div class="search-row">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search services, skills, sellers...">
          </div>
          <select id="sortSelect" class="sort-select">
            <option value="latest">Latest</option>
            <option value="price_low">Price: Low to High</option>
            <option value="price_high">Price: High to Low</option>
            <option value="rating">Top rated</option>
          </select>
        </div>
        <div class="category-pills" id="categoryPills">
          <button class="cat-pill active" data-cat="all">All categories</button>
          <button class="cat-pill" data-cat="Tutoring">📚 Tutoring</button>
          <button class="cat-pill" data-cat="Creative Arts">🎨 Creative Arts</button>
          <button class="cat-pill" data-cat="Tech Support">💻 Tech Support</button>
          <button class="cat-pill" data-cat="Food & Baking">🍰 Food & Baking</button>
          <button class="cat-pill" data-cat="Photography">📸 Photography</button>
          <button class="cat-pill" data-cat="Hair & Beauty">💇 Hair & Beauty</button>
          <button class="cat-pill" data-cat="Music">🎵 Music</button>
          <button class="cat-pill" data-cat="Fitness">💪 Fitness</button>
          <button class="cat-pill" data-cat="Writing">✍️ Writing</button>
          <button class="cat-pill" data-cat="Other">📌 Other</button>
        </div>
      </div>

      <!-- Results Bar -->
      <div class="results-bar">
        <div class="results-count"><strong id="serviceCount">0</strong> services found</div>
      </div>

      <!-- Services Grid -->
      <div id="servicesGrid" class="services-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading services...</p>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

script src="/js/browse.js"></script>
</body>
</html>
